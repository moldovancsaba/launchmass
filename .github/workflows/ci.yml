name: CI

# Functional: Run documentation-consistency checks and a production build on every
#   push to main and every pull request.
# Strategic: Restores the automated docs-check + build gate that the governance docs
#   (TASKLIST.md, ROADMAP.md) rely on. Placeholder env vars satisfy module-load guards
#   (lib/db.js requires MONGODB_URI; lib/session.js requires a signing secret) without
#   contacting any real service.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Verify documentation consistency
        run: npm run verify-docs
      - name: Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/ci-placeholder
          SSO_CLIENT_SECRET: ci-placeholder-secret
